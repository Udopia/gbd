name: Publish to PyPI

# gbd-tools is pure Python: build a universal wheel + sdist and publish on release.
# gbdc (the compiled extension and CLI tools) is released separately from its own repo.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): configure a PyPI publisher for project "gbd-tools"
    # pointing at this repository, workflow "publish.yml", and environment "pypi".
    # No API token needed. To use a token instead, drop the id-token permission and
    # pass `with: { password: ${{ secrets.PYPI_API_TOKEN }} }` to the publish step.
    environment:
      name: pypi
      url: https://pypi.org/p/gbd-tools
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

# GBD default configuration (skeleton).
#
# This file ships with gbd-tools as the built-in default configuration. Any user
# configuration registered via the GBD environment variable (or passed to -d/--db
# as a file path) is layered on top of it, low-to-high precedence:
#
#     bundled defaults  <  $GBD config  <  -d/--db config
#
# Copy this file as a starting point for your own GBD configuration.

# Databases provided to gbd, in addition to any given via -d/--db or GBD_DB.
[databases]
paths = []

# Problem domains: file suffix, identifier (hash) function, and description.
[contexts]
default = "cnf"
cnf = { suffix = ".cnf", idfunc = "cnf_hash", description = "DIMACS Conjunctive Normal Form (CNF)" }
sancnf = { suffix = ".sanitized.cnf", idfunc = "cnf_hash", description = "Sanitized CNF" }
kis = { suffix = ".kis", idfunc = "cnf_hash", description = "k-Independent Set Problem Graph" }
opb = { suffix = ".opb", idfunc = "opb_hash", description = "Pseudo-Boolean Optimization Problem" }
wcnf = { suffix = ".wcnf", idfunc = "wcnf_hash", description = "Weighted CNF (WCNF)" }
wecnf = { suffix = ".wecnf", idfunc = "cnf_hash", description = "Weighted Extended CNF (WECNF)" }

# Feature extractors: external command-line tools that compute features for an
# instance. The `tool` value is the command gbd runs (it may include a subcommand,
# e.g. "gbdc base"). Entries may be defined inline (as below) or offloaded to a
# separate file via `file = "extractors.toml"` (inline entries win on a name clash).
[extractors]
base = { tool = "gbdc base", contexts = ["cnf", "sancnf"], description = "Extract base features from CNF files." }
gate = { tool = "gbdc gate", contexts = ["cnf", "sancnf"], description = "Extract gate features from CNF files." }
checksani = { tool = "gbdc checksani", contexts = ["cnf", "sancnf"], description = "Check sanitation status of CNF files." }
isohash = { tool = "gbdc isohash", contexts = ["cnf", "wcnf", "sancnf"], description = "Compute the ISOHash of CNF or WCNF files." }
isohash2 = { tool = "gbdc isohash2", contexts = ["cnf", "sancnf"], description = "Compute the ISOHash2 of CNF files." }
wcnfbase = { tool = "gbdc wcnfbase", contexts = ["wcnf"], description = "Extract base features from WCNF files." }
opbbase = { tool = "gbdc opbbase", contexts = ["opb"], description = "Extract base features from OPB files." }

# Instance transformers: external command-line tools that derive a new instance
# from an existing one. Entries may be inline or offloaded via `file = "..."`.
# `output_suffix` overrides the target context's suffix for the produced file;
# `compress` (none|xz|gz|bz2) requests compressed output.
[transformers]
sanitise = { tool = "gbdc sanitize", source = ["cnf"], target = ["sancnf"], output_suffix = ".sanitized.cnf", description = "Sanitise CNF files." }
normalise = { tool = "gbdc normalize", source = ["cnf"], target = ["cnf"], output_suffix = ".normalised.cnf", description = "Normalise CNF files." }
cnf2kis = { tool = "gbdc cnf2kis", source = ["cnf"], target = ["kis"], description = "Transform CNF files to k-Independent Set instances." }


